<ion-header>
  <ion-toolbar>
    <ion-title>Dépenses</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    @for (expense of expenses; track expense.id) {

      <ion-item>
        {{ expense.title }} - {{ expense.amount }}€
      </ion-item>

    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToAddExpense()">
      +
    </ion-fab-button>
  </ion-fab>

</ion-content>
