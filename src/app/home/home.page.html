<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Home
    </ion-title>

    @if (!isLoggedIn()){
      <ion-button slot="end" (click)="goToLogin()">
        Se connecter
      </ion-button>
    }
    @else {
      <ion-button slot="end" (click)="logout()">
        Connecté (logout)
      </ion-button>
    }

  </ion-toolbar>
</ion-header>

<ion-button (click)="goToGroups()">
  Mes groupes
</ion-button>
