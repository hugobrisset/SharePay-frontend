<ion-header class="app-header">
  <ion-toolbar>

    @if(showBack){
      <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    }
    
    <ion-title>
      {{ title }}
    </ion-title>

  </ion-toolbar>
</ion-header>
